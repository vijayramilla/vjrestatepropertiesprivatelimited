name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --version
      - run: npm ci
      - run: npm run build
      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: b43a3f56328c360652cc3b9969d22ff2
          command: pages deploy dist --project-name=vjr-estate --branch main
      - name: Print deploy URL
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: echo "Deployed to $DEPLOY_URL"
