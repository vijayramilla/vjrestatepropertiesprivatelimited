name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: b43a3f56328c360652cc3b9969d22ff2

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --version
      - run: npm ci
      - run: npm run build
      - run: npm install -g wrangler@latest
      - name: Test CF API token
        run: |
          echo "=== Token verify ==="
          curl -s "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
          echo ""
          echo "=== Account info ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
          echo ""
          echo "=== Wrangler version ==="
          wrangler --version
          echo "=== Node version ==="
          node --version
      - name: Debug wrangler pages project list
        run: wrangler pages project list
        continue-on-error: true
      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy dist --project-name=vjr-estate --branch main --verbose
