name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  debug-token:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Token length: ${#CLOUDFLARE_API_TOKEN}"
          echo "First 10 chars: ${CLOUDFLARE_API_TOKEN:0:10}"
          echo "Last 10 chars: ${CLOUDFLARE_API_TOKEN: -10}"
      - run: |
          curl -s -o /tmp/cf_verify.json -w "%{http_code}" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
          echo ""
          cat /tmp/cf_verify.json
      - run: |
          curl -s -o /tmp/cf_accounts.json -w "%{http_code}" \
            "https://api.cloudflare.com/client/v4/accounts" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
          echo ""
          cat /tmp/cf_accounts.json

  deploy:
    needs: debug-token
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - run: npx --yes wrangler@latest pages deploy dist --project-name=vjr-estate --branch main
