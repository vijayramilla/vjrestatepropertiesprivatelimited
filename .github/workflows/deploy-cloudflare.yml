name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: b43a3f56328c360652cc3b9969d22ff2

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --version
      - run: npm ci
      - run: npm run build
      - run: npm install -g wrangler@latest
      - name: Test CF API token
        run: |
          echo "=== Token verify ==="
          curl -s "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
          echo ""
          echo "=== Account info ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
          echo ""
          echo "=== Wrangler version ==="
          wrangler --version
          echo "=== Node version ==="
          node --version
      - name: Debug check dist
        run: |
          ls -la dist/
          echo "---"
          wrangler pages project list 2>&1
      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@4.107.0 pages deploy dist --project-name=vjr-estate --branch main 2>&1 || true
        continue-on-error: true
      - name: Show deploy output
        if: always()
        run: |
          echo "Checking dist directory..."
          ls -la dist/
          echo "Checking wrangler config..."
          wrangler --version
          echo "Trying direct API deploy..."
          node -e "
          const https = require('https');
          const fs = require('fs');
          // Test the deployment endpoint
          https.get('https://api.cloudflare.com/client/v4/accounts/b43a3f56328c360652cc3b9969d22ff2/pages/projects/vjr-estate', {
            headers: { 'Authorization': 'Bearer ' + process.env.CLOUDFLARE_API_TOKEN }
          }, (res) => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => console.log('Project info:', data.substring(0, 500)));
          }).on('error', e => console.log('Error:', e.message));
          "
