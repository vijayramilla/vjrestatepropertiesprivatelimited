<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Preconnect to external services -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://maps.googleapis.com" />
  <link rel="preconnect" href="https://firestore.googleapis.com" />
  <link rel="preconnect" href="https://storage.googleapis.com" />

  <!-- DNS prefetch for Firebase -->
  <link rel="dns-prefetch" href="https://firebaseapp.com" />

  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- Theme color for mobile browser -->
  <meta name="theme-color" content="#ffffff" />
  <meta name="application-name" content="VJR Estate" />
  <meta name="apple-mobile-web-app-title" content="VJR Estate" />

  <!-- Preload critical font -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Preload secondary fonts -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" as="style" />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="canonical" href="https://vjrestate.com/" />

  <!-- SEO Meta tags -->
  <title>VJR Estate | Buy Rental Income Properties in Bangalore</title>
  <meta name="description" content="VJR Estate connects investors with rental income properties across Bangalore — PG buildings, residential blocks, commercial assets, and plots with documented monthly returns." />

  <!-- Open Graph for WhatsApp/social sharing -->
  <meta property="og:site_name" content="VJR Estate" />
  <meta property="og:url" content="https://vjrestate.com/" />
  <meta property="og:title" content="VJR Estate | Buy Rental Income Properties in Bangalore" />
  <meta property="og:description" content="Explore verified rental income properties in Bangalore with transparent returns." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://vjrestate.com/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="VJR Estate — Rental Income Properties in Bangalore" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="VJR Estate | Buy Rental Income Properties in Bangalore" />
  <meta name="twitter:description" content="Bangalore's most trusted rental income property company." />
  <meta name="twitter:image" content="https://vjrestate.com/og-image.png" />

  <link rel="manifest" href="/site.webmanifest" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
